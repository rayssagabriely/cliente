<html>
    <title>Cadastro de Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <body>
    <div class="container">
         <nav class="navbar bg-body-tertiary">
  <form class="container-fluid justify-content-start">
    <a href="{% url 'sair' %}" class="btn btn-outline-success me-2" type="button">sair</a>
   </form>
     </nav>
          <form method="post">
           {% csrf_token %}
         <h1>Preencha os dados abaixo</h1>
         <div class="mb-3">
            {{ form.as_p }}
            </div>
            <button type="submit" class="btn btn-primary">Salvar</button>
        </form>
        <table class= "table table-striped table-hover">
            <thead>
                <th>ID do Cliente</th>
                <th>Nome</th>
                <th>Telefone</th>
                <th>CPF</th>
                <th>Data de Nascimento</th>
                <th>Ações</th>
            </thead>
            <tbody>
                {% for cliente in clientes %}
                    <tr>
                        <td>{{ cliente.id }}</td>
                        <td>{{ cliente.nome }}</td>
                        <td>{{ cliente.telefone }}</td>
                        <td>{{ cliente.cpf }}</td>
                        <td>{{ cliente.nascimento }}</td>
                        <td>
                            <a href="{% url 'atualizar_cliente' cliente.id%}" class="btn btn-primary btn-sm">Editar</a>
                            <a href="{% url 'excluir_cliente' cliente.id%}"class="btn btn-danger btn-sm">Excluir</a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
         </table>
    </div>
       </body>
</html>
