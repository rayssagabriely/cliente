|<html>
    <title>Cadastro de Clientes</title>
    <body>
        <form method="post">
            {% csrf_token %}
            <h1>Preencha os dados abaixo</h1>
            {{ form.as_p }}
            <button type=" submit">Salvar</button>
        </form>
        <!--Lista de clientes-->
        <table border="1"> 
            <thead>
                <th>ID do Cliente</th>
                <th>Nome</th>
                <th>CPF</th>
                <th>Telefone</th>
                <th>Data de Nascimento</th>
            </thead>
            <tbody>
                 {% for cliente in clientes %}
                <tr>
                    <td>{{ cliente.id }}</td>
                    <td>{{ cliente.nome }}</td>
                    <td>{{ cliente.cpf }}</td>
                    <td>{{ cliente.telefone }}</td>
                    <td>{{ cliente.nascimento }}</td>
             {% endfor %}
                </tr>
            </tbody>
        </table>
    </body>
</html>
